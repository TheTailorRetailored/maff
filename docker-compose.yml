services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: research_graph
      POSTGRES_USER: research
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - default

  api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    depends_on:
      - db
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://research:${POSTGRES_PASSWORD}@db:5432/research_graph
      DATA_DIR: /data
      XDG_CACHE_HOME: /data/tectonic-cache
      ARTIFACT_INGEST_ROOTS: /mnt/data:/tmp:/data/incoming
      OIDC_ISSUER: ${OIDC_ISSUER}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_ROLE_CLIENT_ID: ${OIDC_ROLE_CLIENT_ID}
      OIDC_ALLOWED_ORGANIZATIONS: ${OIDC_ALLOWED_ORGANIZATIONS:-}
      OIDC_REQUIRED_EMAIL_DOMAIN: ${OIDC_REQUIRED_EMAIL_DOMAIN:-}
      AUTO_JOIN_SHARED_WORKSPACE: ${AUTO_JOIN_SHARED_WORKSPACE:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      QUARTZ_DIR: /quartz
      SKILLS_DIR: /app/skills
      PROMPTS_DIR: /app/prompts
    volumes:
      - research_data:/data
      - ./skills:/app/skills:ro
      - ./prompts:/app/prompts:ro
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - default
      - caddy

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_BASE_URL: ${PUBLIC_BASE_URL}/api
        VITE_OIDC_ISSUER: ${OIDC_ISSUER}
        VITE_OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
        VITE_OIDC_REDIRECT_URI: ${OIDC_WEB_REDIRECT_URI}
        VITE_OIDC_POST_LOGOUT_REDIRECT_URI: ${OIDC_WEB_POST_LOGOUT_REDIRECT_URI}
    environment:
      VITE_API_BASE_URL: ${PUBLIC_BASE_URL}/api
      VITE_OIDC_ISSUER: ${OIDC_ISSUER}
      VITE_OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      VITE_OIDC_REDIRECT_URI: ${OIDC_WEB_REDIRECT_URI}
      VITE_OIDC_POST_LOGOUT_REDIRECT_URI: ${OIDC_WEB_POST_LOGOUT_REDIRECT_URI}
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - default
      - caddy

  caddy:
    image: caddy:2
    profiles: ["proxy"]
    depends_on:
      - api
      - web
    environment:
      PUBLIC_BASE_URL_HOSTNAME: ${PUBLIC_BASE_URL_HOSTNAME:-:80}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"

volumes:
  pg_data:
  research_data:
  caddy_data:
  caddy_config:

networks:
  caddy:
    external: true
    name: caddy_default
